name: Build Cross-Platform Executables

on: [push, pull_request]

jobs:
  build:
    strategy:
      # Prevent a failure on Linux from canceling the Windows build
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - name: Check out source code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # Installs crucial rendering and windowing engines required by PySide on Linux
    - name: Install Linux System Dependencies
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y libegl1-mesa libgl1-mesa-glx libxkbcommon-x11-0 libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-xfixes0

    - name: Install Python Packages
      run: |
        python -m pip install --upgrade pip
        pip install pyside6 pyinstaller

    - name: Build Application Binary
      run: |
        pyinstaller --noconsole --onefile main.py

    - name: Upload Finished Binary
      uses: actions/upload-artifact@v4
      with:
        name: app-${{ matrix.os }}
        path: dist/*
