name: Compile Document to PDF

on:
  push:
    branches:
      - main
    paths:
      - 'docs/vlcpaper.docx'

jobs:
  compile:
    name: Compile docx to pdf
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install LibreOffice
        run: |
          sudo apt-get update
          sudo apt-get install -y libreoffice

      - name: Convert DOCX to PDF
        run: |
          libreoffice --headless --convert-to pdf --outdir docs docs/vlcpaper.docx

      - name: Commit and Push PDF
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/vlcpaper.pdf
          git diff-index --quiet HEAD || git commit -m "Auto-compile vlcpaper.docx to PDF"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
