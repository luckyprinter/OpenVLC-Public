name: Verify Arduino Firmware

on:
  push:
    branches:
      - main
    paths:
      - 'firmware/**'
  pull_request:
    branches:
      - main
    paths:
      - 'firmware/**'

jobs:
  compile:
    name: Compile sketch
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Install ESP32 Core
        run: |
          arduino-cli core update-index --additional-urls https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          arduino-cli core install esp32:esp32 --additional-urls https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json

      - name: Verify Receiver Firmware
        run: |
          arduino-cli compile --fqbn esp32:esp32:esp32 firmware/rx/rx.ino

      - name: Verify DMA Transmitter Firmware
        run: |
          arduino-cli compile --fqbn esp32:esp32:esp32 firmware/tx_dma/tx_dma.ino

      - name: Verify Non-DMA Transmitter Firmware
        run: |
          arduino-cli compile --fqbn esp32:esp32:esp32 firmware/tx_non_dma/tx_non_dma.ino
